apiVersion: apps/v1
kind: Deployment
metadata:
  name: flames-app
  labels:
    app: flames-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flames-app
  template:
    metadata:
      labels:
        app: flames-app
    spec:
      containers:
      - name: flames-container
        image: naveennallamsetti/java_flames:latest
        ports:
        - containerPort: 8080